<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>量化学习平台</title>
    <style>
      #error-overlay {
        display: none;
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: #fff; z-index: 99999; padding: 40px;
        font-family: monospace; font-size: 14px; color: #cf1322;
        overflow: auto; white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-overlay"></div>
    <script>
      // Global error catcher
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML = 'JS ERROR:\n' + msg + '\n\nat ' + url + ':' + line + ':' + col + '\n\n' + (error && error.stack || '');
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('error-overlay');
        el.style.display = 'block';
        el.innerHTML = 'PROMISE ERROR:\n' + (e.reason && (e.reason.message || e.reason)) + '\n\n' + (e.reason && e.reason.stack || '');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
